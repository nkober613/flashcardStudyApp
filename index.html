<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcard Study App</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
</head>
<body>
    <header class="site-header">
        <div class="container">
            <h1>Flashcard Study App</h1>
        </div>
    </header>

    <main class="container">
        <div class="flashcard" id="flashcard">
            <div class="flashcard-inner">
                <div class="card-front">
                    <p id="question">question</p>
                    <p id="question-text"></p>
                </div>
                <div class="card-back">
                    <p id="answer">Answer</p>
                    <p id="answer-text"></p>
                </div>
            </div>
        </div>
        <section class="controls">
            <button id="known-btn" class="btn">Mark as known-btn</button>
            <button id="next-btn" class="btn">Next Card</button>
            <button id="restart" class="btn">Restart</button>
        </section>
        <div id="progress">
                <p>cards mastered: <span id="mastered-count">0</span></p>
               <p> cards remaining: <span id="remaining-count">0</span></p>
            </div>
    </main>
    
</body>
</html>
